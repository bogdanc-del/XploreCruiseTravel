name: CI — Lint, Typecheck, E2E, A11y

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-gates:
    name: Lint + Typecheck + i18n Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xplore-cruise-app
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: xplore-cruise-app/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx next lint
      - run: npx tsx scripts/i18n-audit.ts

  e2e-tests:
    name: E2E Tests (${{ matrix.project }})
    runs-on: ubuntu-latest
    needs: quality-gates
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, webkit]
    defaults:
      run:
        working-directory: xplore-cruise-app
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: xplore-cruise-app/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps ${{ matrix.project }}
      - run: npx playwright test --project=${{ matrix.project }}
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.project }}
          path: xplore-cruise-app/artifacts/playwright-report/
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results-${{ matrix.project }}
          path: xplore-cruise-app/test-results/
          retention-days: 7
